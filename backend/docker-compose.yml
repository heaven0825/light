version: '3.8'

services:
  backend:
    build: .
    container_name: light-backend
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-your_password}
      - DB_NAME=light_memory
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: light-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-your_password}
      - MYSQL_DATABASE=light_memory
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
